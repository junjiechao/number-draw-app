```html
<!DOCTYPE html>
<html lang="zh-Hant">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LINE 抽籤系統</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Microsoft JhengHei", sans-serif;
        }

        body {
            background: #f4f6f9;
            padding: 20px;
        }

        .container {
            max-width: 600px;
            margin: auto;
        }

        .card {
            background: white;
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 15px;
            box-shadow: 0 3px 10px rgba(0,0,0,0.1);
        }

        h1 {
            text-align: center;
            margin-bottom: 20px;
        }

        .user-box {
            background: #dff0d8;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 15px;
            text-align: center;
        }

        .number {
            font-size: 72px;
            font-weight: bold;
            color: #0078d4;
            text-align: center;
            margin: 20px 0;
        }

        button {
            width: 100%;
            padding: 15px;
            border: none;
            border-radius: 10px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
            background: #0078d4;
            color: white;
        }

        button:hover {
            background: #0063b1;
        }

        .status {
            text-align: center;
            margin-top: 15px;
        }

        .loading {
            color: #666;
        }
    </style>
</head>

<body>

<div class="container">

    <h1>🎲 LINE 抽籤系統</h1>

    <div class="card">

        <div id="userInfo" class="user-box">
            載入 LINE 使用者資訊中...
        </div>

    </div>

    <div class="card">

        <div class="number">?</div>

        <button onclick="testButton()">
            測試按鈕
        </button>

        <div class="status" id="status">
            尚未測試
        </div>

    </div>

</div>

<script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>

<script>

const LIFF_ID = "2010438961-eaFXVJME";

let currentUser = null;

async function initLine() {

    try {

        document.getElementById("status").innerHTML =
            "初始化 LINE 中...";

        await liff.init({
            liffId: LIFF_ID
        });

        if (!liff.isLoggedIn()) {

            liff.login();
            return;

        }

        const profile = await liff.getProfile();

        currentUser = profile;

        document.getElementById("userInfo").innerHTML = `
            <h3>登入成功</h3>
            <br>
            <div><b>LINE名稱：</b>${profile.displayName}</div>
        `;

        document.getElementById("status").innerHTML =
            "LINE 登入成功";

        console.log("LINE Profile:", profile);

    }
    catch(error) {

        console.error(error);

        document.getElementById("userInfo").innerHTML =
            "LINE登入失敗";

        document.getElementById("status").innerHTML =
            error;

    }

}

function testButton() {

    if (!currentUser) {

        alert("LINE尚未登入");

        return;

    }

    alert(
        "您好：" +
        currentUser.displayName +
        "\n\nUser ID：\n" +
        currentUser.userId
    );

}

initLine();

</script>

</body>
</html>
