<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LINE抽籤系統</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:"Microsoft JhengHei",sans-serif;
}

body{
    background:#F8F4EC;
    padding:20px;
}

.container{
    max-width:600px;
    margin:auto;
}

.card{
    background:white;
    border-radius:15px;
    padding:20px;
    margin-bottom:15px;
    box-shadow:0 3px 10px rgba(0,0,0,.1);
}

h1{
    text-align:center;
    margin-bottom:20px;
}

.user-box{
    background:#dff0d8;
    padding:15px;
    border-radius:10px;
    text-align:center;
}

.number{
    font-size:80px;
    font-weight:bold;
    color:#C9A227;
    text-align:center;
    margin:30px 0;
}

button{
    width:100%;
    padding:15px;
    border:none;
    border-radius:10px;
    background:#8B1E3F;
    color:white;
    font-size:20px;
    cursor:pointer;
}

button:disabled{
    background:#999;
    cursor:not-allowed;
}

.status{
    text-align:center;
    margin-top:15px;
    font-size:18px;
}

.small{
    text-align:center;
    color:#666;
    margin-top:10px;
}
</style>
</head>

<body>

<div class="container">

    <h1>🛕 媽祖聖籤抽號系統</h1>

    <div class="card">

        <div id="userInfo" class="user-box">
            載入LINE資訊中...
        </div>

    </div>

    <div class="card">

        <div id="result" class="number">?</div>

        <button id="drawBtn">
            向媽祖請示
        </button>

        <div id="status" class="status">
            等待抽號
        </div>

        <div class="small">
            請誠心默念三秒後向媽祖請示
        </div>

    </div>

</div>

<script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>

<script>

const LIFF_ID = "2010438961-eaFXVJME";

const API_URL =
"https://script.google.com/macros/s/AKfycbw527IL41J5njh32eVPx0n58SDOFGAHg_PSEZ2K-dpg-q-zxcp5eS0a795TqXgcdNWY/exec";

let currentUser = null;

async function initLine() {

    try {

        document.getElementById("status").innerText =
            "初始化LINE中...";

        await liff.init({
            liffId: LIFF_ID
        });

        if (!liff.isLoggedIn()) {

            liff.login();
            return;

        }

        currentUser = await liff.getProfile();

        document.getElementById("userInfo").innerHTML =
            "<b>歡迎：</b>" +
            currentUser.displayName;

        document.getElementById("status").innerText =
            "LINE登入成功";

    }
    catch(error){

        console.error(error);

        document.getElementById("status").innerText =
            "LINE登入失敗";

    }

}

async function drawNumber(){

    try{

        if(!currentUser){

            alert("LINE尚未登入");

            return;

        }

        document.getElementById("drawBtn").disabled = true;

        document.getElementById("status").innerText =
            "抽號中...";

        const url =
            API_URL +
            "?userId=" +
            encodeURIComponent(currentUser.userId) +
            "&displayName=" +
            encodeURIComponent(currentUser.displayName);

        const response =
            await fetch(url);

        const data =
            await response.json();

        if(data.success){
        
            let count = 0;
        
            const animation =
            setInterval(()=>{
        
                document.getElementById("result").innerText =
                    Math.floor(Math.random()*16)+1;
        
                count++;
        
                if(count >= 30){
        
                    clearInterval(animation);
        
                    document.getElementById("result").innerText =
                        data.number;
        
                    if(data.alreadyDrawn){
        
                        document.getElementById("status").innerText =
                            "🎋 您已領取聖籤，第 " +
                            data.number +
                            " 號";
        
                    }else{
        
                        document.getElementById("status").innerText =
                            "🎋 第 " +
                            data.number +
                            " 號聖籤";
        
                    }
        
                }
        
            },100);

            if(data.alreadyDrawn){

                document.getElementById("status").innerText =
                    "您已抽過，號碼：" +
                    data.number;

            }else{

                document.getElementById("status").innerText =
                    "恭喜抽到：" +
                    data.number;

            }

        }else{

            document.getElementById("status").innerText =
                data.message;

        }

    }
    catch(error){

        console.error(error);

        document.getElementById("status").innerText =
            "系統錯誤";

    }

}

document
.getElementById("drawBtn")
.addEventListener("click", drawNumber);

initLine();

</script>

</body>
</html>
